  - {type: variant, offset: 1830, length: 2, content: 又有, 原: 爾時佛頂輪王復說真言曰曩莫三滿多重沒馱喃引阿鉢囉二合底賀哆上捨娑曩南引佉佉佉呬吽吽入嚩二合攞入嚩二合攞鉢囉二合入嚩二合攞底瑟吒瑟置哩二合娑頗二合吒娑嚩二合賀若誦此真言者所有執曜惡星陵逼本命胎業等皆悉變為吉祥速離生死流輪疾成無上菩提是時}
